<table class="requests-table">
    <tr>
        <th>Details</th>
        <th>Specific Need</th>
        <th>Client</th>
        <th>Status</th>
        <th>Update Status</th>
    </tr>
    {% for req in requests %}
    <tr>
        <td>{{ req.details }}</td>
        <td>{{ req.specific_need }}</td>
        <td>{{ req.client.name }}</td>
        <td>{{ req.status }}</td>
        <td>
            <form action="{{ url_for('update_request', id=req.id) }}" method="POST">
                <select name="status">
                    <option value="Pending" {% if req.status == "Pending" %}selected{% endif %}>Pending</option>
                    <option value="In Progress" {% if req.status == "In Progress" %}selected{% endif %}>In Progress</option>
                    <option value="Completed" {% if req.status == "Completed" %}selected{% endif %}>Completed</option>
                </select>
                <button type="submit">Update</button>
            </form>
        </td>
    </tr>
    {% endfor %}
</table>
