<!DOCTYPE html>
<html>
<head>
    <title>SilverTech Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>SilverTech System Dashboard</h1>
    <a href="/add_client">Add Client</a> | 
    <a href="/add_request">Add Request</a>

    <h2>Clients</h2>
    <ul>
        {% for client in clients %}
            <li>{{ client.name }} (Age: {{ client.age }})</li>
        {% endfor %}
    </ul>

    <h2>Requests</h2>
    <ul>
        {% for req in requests %}
            <li>{{ req.details }} (Client: {{ req.client }})</li>
        {% endfor %}
    </ul>
</body>
</html>
